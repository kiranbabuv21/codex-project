<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spotyy — Explore</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    :root {
      --bg: #0e0e0e;
      --surface: #161616;
      --surface2: #1f1f1f;
      --surface3: #252525;
      --border: #2a2a2a;
      --accent: #e8a317;
      --accent2: #ff6b35;
      --text: #f0ede8;
      --muted: #6b6660;
      --success: #3ecf8e;
      --danger: #e84040;
      --sidebar-w: 340px;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
    }

    /* ── Layout ── */
    .app {
      display: flex;
      height: 100vh;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: var(--sidebar-w);
      height: 100%;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      z-index: 100;
      flex-shrink: 0;
    }

    .sidebar-header {
      padding: 20px 20px 0;
      border-bottom: 1px solid var(--border);
      padding-bottom: 16px;
    }

    .brand-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .brand-logo {
      font-family: 'Syne', sans-serif;
      font-size: 1.6rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .user-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 10px 5px 5px;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    .user-pill:hover {
      border-color: var(--accent);
    }

    .user-avatar {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      font-weight: 700;
      color: #0e0e0e;
    }

    .user-name {
      font-size: 0.78rem;
      font-weight: 500;
      max-width: 80px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .search-box {
      position: relative;
    }

    .search-box input {
      width: 100%;
      padding: 11px 16px 11px 40px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }

    .search-box input:focus {
      border-color: var(--accent);
    }

    .search-box input::placeholder {
      color: var(--muted);
    }

    .search-icon {
      position: absolute;
      left: 12px;
      top: 14px;
      color: var(--muted);
      pointer-events: none;
    }

    /* ── Autocomplete Dropdown ── */
    .suggestions-dropdown {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      right: 0;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      max-height: 220px;
      overflow-y: auto;
      z-index: 9999;
      display: none;
      scrollbar-width: thin;
      scrollbar-color: var(--surface3) transparent;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
    }

    .suggestions-dropdown.open {
      display: block;
    }

    .suggestion-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 14px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }

    .suggestion-item:last-child {
      border-bottom: none;
    }

    .suggestion-item:hover,
    .suggestion-item.highlighted {
      background: rgba(232, 163, 23, 0.08);
    }

    .suggestion-icon {
      font-size: 1rem;
      margin-top: 1px;
      flex-shrink: 0;
    }

    .suggestion-text {
      flex: 1;
      min-width: 0;
    }

    .suggestion-main {
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .suggestion-sub {
      font-size: 0.72rem;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .search-clear {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 1rem;
      display: none;
      line-height: 1;
      padding: 2px 4px;
    }

    .search-clear.visible {
      display: block;
    }

    .search-radius {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }

    .radius-chip {
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      border-radius: 14px;
      padding: 3px 9px;
      font-size: 0.72rem;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.2s;
    }

    .radius-chip:hover {
      border-color: var(--accent);
      color: var(--text);
    }

    .radius-chip.active {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(232, 163, 23, 0.12);
    }

    /* ── Category Chips ── */
    .cats {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .cats::-webkit-scrollbar {
      display: none;
    }

    .cat-chip {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 6px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.78rem;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .cat-chip:hover {
      border-color: var(--accent);
      color: var(--text);
    }

    .cat-chip.active {
      background: rgba(232, 163, 23, 0.12);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── Results ── */
    .results-header {
      padding: 14px 20px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .results-title {
      font-family: 'Syne', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
    }

    .results-count {
      font-size: 0.75rem;
      color: var(--muted);
    }

    .results-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 12px 12px;
      scrollbar-width: thin;
      scrollbar-color: var(--surface3) transparent;
    }

    .place-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.15s;
      animation: fadeUp 0.3s ease both;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .place-card:hover {
      border-color: rgba(232, 163, 23, 0.4);
      transform: translateX(3px);
    }

    .place-card.active {
      border-color: var(--accent);
      background: rgba(232, 163, 23, 0.05);
    }

    .place-card-top {
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }

    .place-icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: var(--surface3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      flex-shrink: 0;
    }

    .place-info {
      flex: 1;
      min-width: 0;
    }

    .place-name {
      font-weight: 500;
      font-size: 0.9rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .place-addr {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .place-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 8px;
    }

    .badge {
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: 10px;
      border: 1px solid var(--border);
      color: var(--muted);
    }

    .badge.open {
      border-color: rgba(62, 207, 142, 0.4);
      color: var(--success);
    }

    .badge.rating {
      border-color: rgba(232, 163, 23, 0.3);
      color: var(--accent);
    }

    .dist-tag {
      font-size: 0.72rem;
      color: var(--muted);
      margin-left: auto;
    }

    .nav-btn {
      margin-top: 8px;
      width: 100%;
      padding: 7px;
      border-radius: 7px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--accent);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.78rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
      display: none;
    }

    .place-card.active .nav-btn {
      display: block;
    }

    .nav-btn:hover {
      background: rgba(232, 163, 23, 0.1);
    }

    /* ── Location Bar ── */
    .location-bar {
      padding: 10px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.78rem;
      color: var(--muted);
    }

    .loc-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--success);
      flex-shrink: 0;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
        transform: scale(1)
      }

      50% {
        opacity: 0.4;
        transform: scale(0.7)
      }
    }

    .refresh-loc {
      margin-left: auto;
      background: none;
      border: none;
      color: var(--accent);
      font-size: 0.75rem;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
    }

    /* ── Map ── */
    .map-wrap {
      flex: 1;
      position: relative;
      height: 100%;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    /* Leaflet dark override */
    .leaflet-container {
      background: #0e0e0e !important;
    }

    .leaflet-tile {
      filter: brightness(0.7) saturate(0.8) hue-rotate(5deg);
    }

    .leaflet-control-zoom a {
      background: var(--surface) !important;
      color: var(--text) !important;
      border-color: var(--border) !important;
    }

    /* ── Map Overlay Buttons ── */
    .map-controls {
      position: absolute;
      top: 16px;
      right: 16px;
      z-index: 500;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .map-btn {
      width: 40px;
      height: 40px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: border-color 0.2s;
      color: var(--text);
    }

    .map-btn:hover {
      border-color: var(--accent);
    }

    /* ── Detail Panel (bottom sheet on map) ── */
    .detail-panel {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      border-radius: 16px 16px 0 0;
      padding: 20px 24px 28px;
      z-index: 500;
      transform: translateY(100%);
      transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
      max-height: 45%;
      overflow-y: auto;
    }

    .detail-panel.open {
      transform: translateY(0);
    }

    .detail-handle {
      width: 36px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 0 auto 16px;
    }

    .detail-name {
      font-family: 'Syne', sans-serif;
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .detail-addr {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 14px;
    }

    .detail-actions {
      display: flex;
      gap: 10px;
    }

    .action-btn {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: none;
      font-family: 'Syne', sans-serif;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .action-btn.primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #0e0e0e;
    }

    .action-btn.secondary {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .action-btn:hover {
      opacity: 0.85;
    }

    /* ── Route Line Info ── */
    .route-info {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 500;
      background: var(--surface);
      border: 1px solid var(--accent);
      border-radius: 20px;
      padding: 8px 18px;
      font-size: 0.82rem;
      display: none;
      gap: 12px;
      align-items: center;
    }

    .route-info.show {
      display: flex;
    }

    .route-info span {
      color: var(--accent);
      font-weight: 600;
    }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
    }

    .empty-state .e-icon {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    .empty-state p {
      font-size: 0.85rem;
    }

    /* ── Loading ── */
    .loading-overlay {
      position: absolute;
      inset: 0;
      background: rgba(14, 14, 14, 0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      backdrop-filter: blur(4px);
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* ── Mobile ── */
    @media(max-width: 680px) {
      .sidebar {
        width: 100%;
        position: absolute;
        height: 55%;
        bottom: 0;
        border-right: none;
        border-top: 1px solid var(--border);
        z-index: 200;
        border-radius: 16px 16px 0 0;
      }

      .map-wrap {
        height: 45%;
      }

      .app {
        flex-direction: column-reverse;
      }
    }
  </style>
</head>

<body>

  <div class="app">
    <!-- ── Sidebar ── -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="brand-row">
          <div class="brand-logo">spotyy</div>
          <div class="user-pill" onclick="logout()">
            <div class="user-avatar" id="user-avatar">U</div>
            <span class="user-name" id="user-name">User</span>
          </div>
        </div>
        <div class="search-box" id="search-box">
          <svg class="search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2">
            <circle cx="11" cy="11" r="8" />
            <path d="m21 21-4.35-4.35" />
          </svg>
          <input type="text" id="search-input" placeholder="Search a location, city, area…"
            oninput="handleSearch(this.value)" onkeydown="handleSearchKey(event)" autocomplete="off">
          <button class="search-clear" id="search-clear" onclick="clearSearch()" title="Clear">✕</button>
          <div class="suggestions-dropdown" id="suggestions-dropdown"></div>
          <div class="search-radius" id="search-radius">
            <button class="radius-chip" onclick="setSearchRadius(this,5000)">5 km</button>
            <button class="radius-chip" onclick="setSearchRadius(this,20000)">20 km</button>
            <button class="radius-chip active" onclick="setSearchRadius(this,50000)">50 km</button>
          </div>
        </div>
      </div>

      <!-- Category Chips -->
      <div class="cats" id="cats">
        <button class="cat-chip active" data-type="all" onclick="selectCat(this,'all')">🗺️ All</button>
        <button class="cat-chip" data-type="restaurant" onclick="selectCat(this,'restaurant')">🍽️ Food</button>
        <button class="cat-chip" data-type="tourist_attraction" onclick="selectCat(this,'tourist_attraction')">📸
          Tourist</button>
        <button class="cat-chip" data-type="lodging" onclick="selectCat(this,'lodging')">🏨 Hotels</button>
        <button class="cat-chip" data-type="hospital" onclick="selectCat(this,'hospital')">🏥 Hospital</button>
        <button class="cat-chip" data-type="gas_station" onclick="selectCat(this,'gas_station')">⛽ Petrol</button>
        <button class="cat-chip" data-type="atm" onclick="selectCat(this,'atm')">🏧 ATM</button>
        <button class="cat-chip" data-type="shopping_mall" onclick="selectCat(this,'shopping_mall')">🛍️ Mall</button>
        <button class="cat-chip" data-type="hindu_temple" onclick="selectCat(this,'hindu_temple')">🛕 Temple</button>
      </div>

      <div class="results-header">
        <span class="results-title">Nearby Places</span>
        <span class="results-count" id="results-count">—</span>
      </div>

      <div class="results-list" id="results-list">
        <div class="empty-state">
          <div class="e-icon">📍</div>
          <p>Allow location access to discover places near you</p>
        </div>
      </div>

      <div class="location-bar">
        <div class="loc-dot" id="loc-dot" style="background:var(--muted)"></div>
        <span id="loc-text">Detecting location…</span>
        <button class="refresh-loc" onclick="getUserLocation()">↻ Refresh</button>
      </div>
    </aside>

    <!-- ── Map ── -->
    <div class="map-wrap">
      <div id="map"></div>

      <div class="route-info" id="route-info">
        🧭 Route: <span id="route-dist">—</span> &nbsp;·&nbsp; Est. <span id="route-time">—</span>
        <button onclick="clearRoute()"
          style="background:none;border:none;color:var(--muted);cursor:pointer;margin-left:6px;">✕</button>
      </div>

      <div class="map-controls">
        <div class="map-btn" onclick="centerOnUser()" title="My Location">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3" />
            <path d="M12 2v3M12 19v3M2 12h3M19 12h3" />
          </svg>
        </div>
        <div class="map-btn" onclick="toggleSatellite()" title="Toggle Satellite" id="sat-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 2L2 7l10 5 10-5-10-5z" />
            <path d="M2 17l10 5 10-5" />
            <path d="M2 12l10 5 10-5" />
          </svg>
        </div>
      </div>

      <!-- Detail bottom sheet -->
      <div class="detail-panel" id="detail-panel">
        <div class="detail-handle"></div>
        <div class="detail-name" id="dp-name">Place Name</div>
        <div class="detail-addr" id="dp-addr">Address here</div>
        <div class="detail-actions">
          <button class="action-btn primary" onclick="startNavigation()">🧭 Navigate</button>
          <button class="action-btn secondary" onclick="closeDetail()">✕ Close</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    // ─── Auth Guard ───────────────────────────────────────
    const token = localStorage.getItem('spotyy_token');
    const userData = JSON.parse(localStorage.getItem('spotyy_user') || '{}');
    if (!token) window.location.href = '/';

    // Set user display
    const uName = userData.name || 'User';
    document.getElementById('user-name').textContent = uName.split(' ')[0];
    document.getElementById('user-avatar').textContent = uName[0].toUpperCase();

    function logout() {
      if (confirm('Sign out of Spotyy?')) {
        localStorage.removeItem('spotyy_token');
        localStorage.removeItem('spotyy_user');
        window.location.href = '/';
      }
    }

    // ─── Map Setup ────────────────────────────────────────
    const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([20.5937, 78.9629], 5);

    L.control.zoom({ position: 'bottomright' }).addTo(map);
    L.control.attribution({ position: 'bottomleft', prefix: '' }).addTo(map);

    const streetTile = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19, attribution: '© OpenStreetMap' });
    const satTile = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom: 19 });
    streetTile.addTo(map);
    let isSat = false;

    function toggleSatellite() {
      if (isSat) { map.removeLayer(satTile); streetTile.addTo(map); }
      else { map.removeLayer(streetTile); satTile.addTo(map); }
      isSat = !isSat;
      document.getElementById('sat-btn').style.borderColor = isSat ? 'var(--accent)' : '';
    }

    // Custom marker icons
    function makeIcon(emoji) {
      return L.divIcon({
        html: `<div style="background:var(--surface,#161616);border:2px solid rgba(232,163,23,0.6);border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:14px;box-shadow:0 2px 8px rgba(0,0,0,0.6)">${emoji}</div>`,
        className: '',
        iconSize: [32, 32],
        iconAnchor: [16, 16]
      });
    }

    const userIcon = L.divIcon({
      html: `<div style="width:14px;height:14px;background:#e8a317;border:3px solid #fff;border-radius:50%;box-shadow:0 0 0 6px rgba(232,163,23,0.25)"></div>`,
      className: '',
      iconSize: [14, 14],
      iconAnchor: [7, 7]
    });

    const catEmoji = {
      restaurant: '🍽️', tourist_attraction: '📸', lodging: '🏨',
      hospital: '🏥', gas_station: '⛽', atm: '🏧',
      shopping_mall: '🛍️', hindu_temple: '🛕', default: '📍'
    };

    // ─── State ────────────────────────────────────────────
    let userLatLng = null;
    let userMarker = null;
    let placeMarkers = [];
    let routeLayer = null;
    let allPlaces = [];
    let filteredPlaces = [];
    let activeCard = null;
    let activeType = 'all';
    let selectedPlace = null;

    // ─── Location ─────────────────────────────────────────
    function getUserLocation() {
      document.getElementById('loc-dot').style.background = 'var(--muted)';
      document.getElementById('loc-text').textContent = 'Detecting location…';

      if (!navigator.geolocation) {
        document.getElementById('loc-text').textContent = 'Geolocation not supported';
        return;
      }

      navigator.geolocation.getCurrentPosition(
        pos => {
          userLatLng = [pos.coords.latitude, pos.coords.longitude];
          document.getElementById('loc-dot').style.background = 'var(--success)';

          // Reverse geocode via Nominatim
          fetch(`https://nominatim.openstreetmap.org/reverse?lat=${userLatLng[0]}&lon=${userLatLng[1]}&format=json`)
            .then(r => r.json())
            .then(d => {
              const city = d.address?.city || d.address?.town || d.address?.village || 'your area';
              document.getElementById('loc-text').textContent = city + ', India';
            }).catch(() => {
              document.getElementById('loc-text').textContent = 'Location found';
            });

          if (userMarker) map.removeLayer(userMarker);
          userMarker = L.marker(userLatLng, { icon: userIcon }).addTo(map);
          map.setView(userLatLng, 14);

          fetchNearbyPlaces(activeType);
        },
        err => {
          document.getElementById('loc-text').textContent = 'Location denied';
          document.getElementById('loc-dot').style.background = 'var(--danger)';
          // Demo: use Delhi
          userLatLng = [28.6139, 77.2090];
          map.setView(userLatLng, 13);
          fetchNearbyPlaces(activeType);
        },
        { enableHighAccuracy: true, timeout: 10000 }
      );
    }

    function centerOnUser() {
      if (userLatLng) map.setView(userLatLng, 15);
    }

    // ─── Single broad Overpass query — ALL types at once ──
    // Category chips filter client-side, no extra API calls.
    const ALL_PLACES_QUERY = `[out:json][timeout:25];
(
  node["amenity"~"restaurant|cafe|fast_food|bar|food_court|hospital|clinic|pharmacy|doctors|dentist|fuel|atm|bank|place_of_worship|marketplace|school|university"](around:RADIUS,LAT,LON);
  node["tourism"~"hotel|hostel|guest_house|motel|resort|attraction|museum|viewpoint|artwork|gallery|theme_park|zoo"](around:RADIUS,LAT,LON);
  node["shop"~"mall|supermarket|department_store|convenience|clothes|electronics|market"](around:RADIUS,LAT,LON);
  node["historic"~"monument|ruins|fort|castle|archaeological_site"](around:RADIUS,LAT,LON);
  way["amenity"~"restaurant|cafe|hospital|fuel|place_of_worship|bank|pharmacy"](around:RADIUS,LAT,LON);
  way["tourism"~"hotel|hostel|attraction|museum|theme_park"](around:RADIUS,LAT,LON);
  way["shop"~"mall|supermarket|department_store|market"](around:RADIUS,LAT,LON);
  way["historic"~"fort|castle|monument"](around:RADIUS,LAT,LON);
);
out center 100;`;
    // ─── Overpass result → emoji ───────────────────────────
    function osmEmoji(tags) {
      const a = tags.amenity || '', t = tags.tourism || '', s = tags.shop || '', h = tags.historic || '', r = tags.religion || '';
      if (a.match(/restaurant|cafe|fast_food|bar|food_court/)) return '🍽️';
      if (a === 'hospital') return '🏥';
      if (a.match(/clinic|doctors|dentist/)) return '🏥';
      if (a === 'pharmacy') return '💊';
      if (a === 'fuel') return '⛽';
      if (a === 'atm') return '🏧';
      if (a === 'bank') return '🏦';
      if (a === 'school') return '🏫';
      if (a === 'university') return '🎓';
      if (a === 'place_of_worship') {
        if (r === 'christian') return '⛪';
        if (r === 'muslim') return '🕌';
        if (r === 'hindu' || r === 'sikh') return '🛕';
        if (r === 'buddhist') return '☸️';
        return '🛕';
      }
      if (t.match(/hotel|hostel|guest_house|motel|resort/)) return '🏨';
      if (t.match(/attraction|museum|gallery/)) return '📸';
      if (t === 'viewpoint') return '🌅';
      if (t.match(/theme_park|zoo/)) return '🎡';
      if (s === 'mall') return '🛍️';
      if (s.match(/supermarket|convenience/)) return '🛒';
      if (s === 'clothes') return '👗';
      if (s === 'electronics') return '📱';
      if (h.match(/fort|castle/)) return '🏰';
      if (h.match(/monument|ruins/)) return '🗿';
      return '📍';
    }

    // ─── Overpass result → category type ──────────────────
    function osmType(tags) {
      const a = tags.amenity || '', t = tags.tourism || '', s = tags.shop || '', h = tags.historic || '';
      if (a.match(/restaurant|cafe|fast_food|bar|food_court/)) return 'restaurant';
      if (a.match(/hospital|clinic|pharmacy|doctors|dentist|veterinary/)) return 'hospital';
      if (a === 'fuel') return 'gas_station';
      if (a.match(/atm|bank/)) return 'atm';
      if (a === 'place_of_worship') return 'hindu_temple';
      if (a === 'marketplace') return 'shopping_mall';
      if (t.match(/hotel|hostel|guest_house|motel|resort|apartment/)) return 'lodging';
      if (t.match(/attraction|museum|viewpoint|artwork|gallery|theme_park|zoo/)) return 'tourist_attraction';
      if (h.match(/monument|ruins|fort|castle|archaeological_site/)) return 'tourist_attraction';
      if (s) return 'shopping_mall';
      return 'all';
    }

    // ─── Master cache: "lat4,lon4" → all parsed places ────
    let masterCache = null;
    let masterCacheKey = '';

    // ─── Overpass mirrors ─────────────────────────────────
    const OVERPASS_MIRRORS = [
      'https://overpass-api.de/api/interpreter',
      'https://overpass.kumi.systems/api/interpreter',
      'https://maps.mail.ru/osm/tools/overpass/api/interpreter'
    ];

    async function fetchWithFallback(body) {
      for (const url of OVERPASS_MIRRORS) {
        try {
          const ctrl = new AbortController();
          const timer = setTimeout(() => ctrl.abort(), 12000);
          const res = await fetch(url, {
            method: 'POST',
            body,
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            signal: ctrl.signal
          });
          clearTimeout(timer);
          if (!res.ok) throw new Error('HTTP ' + res.status);
          return await res.json();
        } catch (e) {
          console.warn('Overpass mirror failed:', url, e.message);
        }
      }
      throw new Error('All Overpass mirrors failed');
    }

    // Parse raw Overpass elements into our place format
    function parseOverpassResults(elements, lat, lon) {
      const seen = new Set();
      return elements
        .filter(el => {
          const uniqueId = `${el.type || 'x'}:${el.id}`;
          if (seen.has(uniqueId)) return false;
          seen.add(uniqueId);
          const tags = el.tags || {};
          return tags.name || tags['name:en']; // only named places
        })
        .map(el => {
          const tags = el.tags || {};
          const elLat = el.lat ?? el.center?.lat;
          const elLon = el.lon ?? el.center?.lon;
          if (!elLat || !elLon) return null;

          const name = tags.name || tags['name:en'] || '';
          const addrParts = [tags['addr:street'], tags['addr:suburb'], tags['addr:city']].filter(Boolean);
          const addr = addrParts.join(', ') || tags['addr:full'] || '';
          const openTag = tags.opening_hours;
          const isOpen = openTag ? !openTag.toLowerCase().includes('closed') : true;
          const dist = Math.round(calcDist(lat, lon, elLat, elLon) * 1000);

          return {
            id: el.id,
            name,
            addr,
            lat: elLat,
            lon: elLon,
            type: osmType(tags),
            emoji: osmEmoji(tags),
            open: isOpen,
            rating: null,
            distance: dist,
            tags
          };
        })
        .filter(p => p !== null)
        .sort((a, b) => a.distance - b.distance);
    }

    // ONE fetch for the current location — category chips filter locally
    async function fetchNearbyPlaces(type) {
      if (!userLatLng) return;
      showListLoading();

      const [lat, lon] = userLatLng;
      const radius = Math.min(Math.max(parseInt(searchRadiusMeters, 10) || 50000, 1000), 200000);
      const locKey = `${lat.toFixed(4)},${lon.toFixed(4)},${radius}`;

      // If master data is already loaded for this location, just filter
      if (masterCache && masterCacheKey === locKey) {
        applyTypeFilter(type);
        return;
      }

      // First time (or new location) — fetch everything at once
      try {
        const query = ALL_PLACES_QUERY
          .replace(/RADIUS/g, radius)
          .replace(/LAT/g, lat)
          .replace(/LON/g, lon);

        const data = await fetchWithFallback('data=' + encodeURIComponent(query));

        if (!data.elements || data.elements.length === 0) throw new Error('No OSM data returned');

        masterCache = parseOverpassResults(data.elements, lat, lon);
        masterCacheKey = locKey;

        if (masterCache.length === 0) throw new Error('No named places found');

        applyTypeFilter(type);

      } catch (e) {
        console.warn('Overpass fetch failed:', e.message);
        document.getElementById('results-list').innerHTML = `
          <div class="empty-state">
            <div class="e-icon">📡</div>
            <p>Could not load places.<br>Check your internet & try again.<br><small style="color:var(--muted)">${e.message}</small></p>
          </div>`;
        document.getElementById('results-count').textContent = '0 found';
        allPlaces = []; filteredPlaces = [];
        placeMarkers.forEach(m => map.removeLayer(m));
        placeMarkers = [];
      }
    }

    // Filter master list by category and render
    function applyTypeFilter(type) {
      if (!masterCache) return;
      allPlaces = type === 'all'
        ? masterCache
        : masterCache.filter(p => p.type === type);
      filteredPlaces = [...allPlaces];
      renderPlaces(filteredPlaces);
      renderMarkers(filteredPlaces);
    }

    // ─── Render ───────────────────────────────────────────
    function renderPlaces(places) {
      const list = document.getElementById('results-list');
      document.getElementById('results-count').textContent = places.length + ' found';

      if (!places.length) {
        list.innerHTML = `<div class="empty-state"><div class="e-icon">🔍</div><p>No places found nearby.<br>Try a different category.</p></div>`;
        return;
      }

      list.innerHTML = places.map((p, i) => `
    <div class="place-card" id="card-${p.id}" onclick="selectPlace(${p.id})" style="animation-delay:${i * 40}ms">
      <div class="place-card-top">
        <div class="place-icon">${p.emoji || catEmoji[p.type] || '📍'}</div>
        <div class="place-info">
          <div class="place-name">${p.name}</div>
          <div class="place-addr">${p.addr || p.address || ''}</div>
        </div>
      </div>
      <div class="place-meta">
        ${p.open ? '<span class="badge open">Open</span>' : '<span class="badge">Closed</span>'}
        ${p.rating ? `<span class="badge rating">★ ${p.rating}</span>` : ''}
        <span class="dist-tag">${formatDist(p.distance)}</span>
      </div>
      <button class="nav-btn" onclick="event.stopPropagation();startNavTo(${p.id})">🧭 Navigate Here</button>
    </div>
  `).join('');
    }

    function formatDist(m) {
      if (!m) return '';
      return m >= 1000 ? (m / 1000).toFixed(1) + ' km' : m + ' m';
    }

    function renderMarkers(places) {
      placeMarkers.forEach(m => map.removeLayer(m));
      placeMarkers = [];

      places.forEach(p => {
        if (!p.lat || !p.lon) return;
        const em = p.emoji || catEmoji[p.type] || '📍';
        const m = L.marker([p.lat, p.lon], { icon: makeIcon(em) })
          .addTo(map)
          .on('click', () => selectPlace(p.id));
        placeMarkers.push(m);
      });
    }

    function selectPlace(id) {
      const place = filteredPlaces.find(p => p.id === id);
      if (!place) return;
      selectedPlace = place;

      // Highlight card
      document.querySelectorAll('.place-card').forEach(c => c.classList.remove('active'));
      const card = document.getElementById(`card-${id}`);
      if (card) { card.classList.add('active'); card.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }

      // Fly to place
      map.flyTo([place.lat, place.lon], 16, { duration: 1 });

      // Show detail panel
      document.getElementById('dp-name').textContent = place.name;
      document.getElementById('dp-addr').textContent = place.addr || place.address || '';
      document.getElementById('detail-panel').classList.add('open');
    }

    function closeDetail() {
      document.getElementById('detail-panel').classList.remove('open');
      document.querySelectorAll('.place-card').forEach(c => c.classList.remove('active'));
      selectedPlace = null;
    }

    // ─── Navigation ───────────────────────────────────────
    function startNavigation() {
      if (selectedPlace) startNavTo(selectedPlace.id);
    }

    async function startNavTo(id) {
      const place = filteredPlaces.find(p => p.id === id);
      if (!place || !userLatLng) return;

      if (routeLayer) map.removeLayer(routeLayer);
      closeDetail();

      // Show loading indicator
      document.getElementById('route-dist').textContent = '…';
      document.getElementById('route-time').textContent = '…';
      document.getElementById('route-info').classList.add('show');

      try {
        // Use OSRM public routing API for real road-following route
        const osrmUrl = `https://router.project-osrm.org/route/v1/driving/${userLatLng[1]},${userLatLng[0]};${place.lon},${place.lat}?overview=full&geometries=geojson`;
        const res = await fetch(osrmUrl);
        const data = await res.json();

        if (data.code === 'Ok' && data.routes && data.routes.length > 0) {
          const route = data.routes[0];
          const coords = route.geometry.coordinates.map(([lng, lat]) => [lat, lng]);

          // Draw road-following route
          routeLayer = L.polyline(coords, {
            color: '#e8a317',
            weight: 5,
            opacity: 0.9,
            lineJoin: 'round',
            lineCap: 'round'
          }).addTo(map);

          map.fitBounds(routeLayer.getBounds(), { padding: [60, 60] });

          // Real distance & duration from OSRM
          const distKm = route.distance / 1000;
          const mins = Math.round(route.duration / 60);
          document.getElementById('route-dist').textContent = distKm < 1 ? route.distance.toFixed(0) + ' m' : distKm.toFixed(1) + ' km';
          document.getElementById('route-time').textContent = mins < 1 ? '< 1 min' : mins + ' min';
        } else {
          throw new Error('No route found');
        }
      } catch (e) {
        console.warn('OSRM routing failed, using straight line fallback:', e);

        // Fallback: straight line with dashes
        routeLayer = L.polyline([userLatLng, [place.lat, place.lon]], {
          color: '#e8a317', weight: 3, dashArray: '8 6', opacity: 0.85
        }).addTo(map);

        map.fitBounds(routeLayer.getBounds(), { padding: [60, 60] });

        const dist = calcDist(userLatLng[0], userLatLng[1], place.lat, place.lon);
        const mins = Math.round(dist / 40 * 60);
        document.getElementById('route-dist').textContent = dist < 1 ? (dist * 1000).toFixed(0) + ' m' : dist.toFixed(1) + ' km';
        document.getElementById('route-time').textContent = mins < 1 ? '< 1 min' : mins + ' min';
      }
    }

    function clearRoute() {
      if (routeLayer) { map.removeLayer(routeLayer); routeLayer = null; }
      document.getElementById('route-info').classList.remove('show');
    }

    function calcDist(lat1, lon1, lat2, lon2) {
      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const a = Math.sin(dLat / 2) ** 2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) ** 2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    // ─── Category Filter ──────────────────────────────────
    function selectCat(el, type) {
      document.querySelectorAll('.cat-chip').forEach(c => c.classList.remove('active'));
      el.classList.add('active');
      activeType = type;
      clearRoute();
      closeDetail();
      fetchNearbyPlaces(type);
    }

    // ─── Location Search & Autocomplete ──────────────────
    let searchTimer;
    let suggestionData = [];
    let highlightIdx = -1;
    let searchRadiusMeters = 50000;
    let suggestionScope = 'nearby';
    let suggestionRequestId = 0;
    let activeSuggestionController = null;
    const SUGGESTION_CACHE_TTL_MS = 60 * 1000;
    const suggestionCache = new Map();

    function setSearchRadius(el, meters) {
      if (searchRadiusMeters === meters) return;
      searchRadiusMeters = meters;
      document.querySelectorAll('#search-radius .radius-chip').forEach(chip => chip.classList.remove('active'));
      el.classList.add('active');

      masterCache = null;
      masterCacheKey = '';
      if (userLatLng) fetchNearbyPlaces(activeType);

      const query = document.getElementById('search-input').value.trim();
      if (query.length >= 2) {
        clearTimeout(searchTimer);
        fetchSuggestions(query);
      }
    }

    function handleSearch(val) {
      clearTimeout(searchTimer);
      const q = val.trim();
      const clearBtn = document.getElementById('search-clear');
      clearBtn.classList.toggle('visible', q.length > 0);

      if (!q || q.length < 2) {
        closeSuggestions();
        return;
      }

      // Debounce then fetch location autocomplete
      searchTimer = setTimeout(() => fetchSuggestions(q), 350);
    }

    async function fetchSuggestions(query) {
      const requestId = ++suggestionRequestId;
      if (activeSuggestionController) {
        activeSuggestionController.abort();
      }
      activeSuggestionController = new AbortController();
      const dropdown = document.getElementById('suggestions-dropdown');
      dropdown.innerHTML = `<div class="suggestion-item"><span class="suggestion-icon">⏳</span><div class="suggestion-text"><div class="suggestion-main">Searching…</div></div></div>`;
      dropdown.classList.add('open');
      highlightIdx = -1;

      try {
        const cacheKey = JSON.stringify({
          q: query.toLowerCase(),
          r: searchRadiusMeters,
          lat: userLatLng ? userLatLng[0].toFixed(3) : null,
          lon: userLatLng ? userLatLng[1].toFixed(3) : null
        });
        const now = Date.now();
        const cached = suggestionCache.get(cacheKey);
        if (cached && now - cached.ts < SUGGESTION_CACHE_TTL_MS) {
          suggestionScope = cached.scope;
          suggestionData = cached.data;
          renderSuggestions();
          return;
        }

        const params = new URLSearchParams({
          q: query,
          radius: String(searchRadiusMeters),
          limit: '8'
        });
        if (userLatLng) {
          params.set('lat', String(userLatLng[0]));
          params.set('lon', String(userLatLng[1]));
        }

        const res = await fetch(`/api/places/search?${params.toString()}`, {
          headers: { Authorization: `Bearer ${token}` },
          signal: activeSuggestionController.signal
        });
        let data = [];
        if (res.ok) {
          const payload = await res.json();
          if (requestId !== suggestionRequestId) return;
          suggestionScope = payload.scope || (userLatLng ? 'nearby' : 'global');
          data = Array.isArray(payload.places) ? payload.places : [];
        }

        if (!data.length) {
          const fallbackUrl = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&limit=8&addressdetails=1`;
          const fallbackRes = await fetch(fallbackUrl, {
            headers: { 'Accept-Language': 'en' },
            signal: activeSuggestionController.signal
          });
          if (fallbackRes.ok) {
            const fallbackData = await fallbackRes.json();
            if (requestId !== suggestionRequestId) return;
            suggestionScope = 'global';
            data = Array.isArray(fallbackData) ? fallbackData.map(item => ({
              name: item.display_name.split(',')[0],
              addr: item.display_name,
              lat: parseFloat(item.lat),
              lon: parseFloat(item.lon),
              type: item.type,
              class: item.class
            })) : [];
          }
        }

        suggestionData = data.map(item => ({
          name: item.name || (item.addr ? String(item.addr).split(',')[0] : query),
          sub: item.addr ? String(item.addr).split(',').slice(1, 4).join(', ').trim() : '',
          lat: parseFloat(item.lat),
          lon: parseFloat(item.lon),
          emoji: locationEmoji(item.type || '', item.class || '')
        })).filter(item => Number.isFinite(item.lat) && Number.isFinite(item.lon));
        suggestionCache.set(cacheKey, { ts: now, data: suggestionData, scope: suggestionScope });
        if (suggestionCache.size > 120) {
          const oldestKey = suggestionCache.keys().next().value;
          if (oldestKey) suggestionCache.delete(oldestKey);
        }

        if (suggestionData.length === 0) {
          dropdown.innerHTML = `<div class="suggestion-item"><span class="suggestion-icon">🔍</span><div class="suggestion-text"><div class="suggestion-main">No results found</div><div class="suggestion-sub">Try a different spelling</div></div></div>`;
          return;
        }

        if (requestId !== suggestionRequestId) return;
        renderSuggestions();
      } catch (e) {
        if (e.name === 'AbortError') return;
        if (requestId !== suggestionRequestId) return;
        dropdown.innerHTML = `<div class="suggestion-item"><span class="suggestion-icon">⚠️</span><div class="suggestion-text"><div class="suggestion-main">Search failed</div><div class="suggestion-sub">Check your connection</div></div></div>`;
      }
    }

    function renderSuggestions() {
      const dropdown = document.getElementById('suggestions-dropdown');
      const scopeNote = suggestionScope === 'global'
        ? `<div class="suggestion-item" style="cursor:default;opacity:.85;">
            <span class="suggestion-icon">🌍</span>
            <div class="suggestion-text">
              <div class="suggestion-main">Showing global results</div>
              <div class="suggestion-sub">No nearby matches found in selected radius</div>
            </div>
          </div>`
        : '';

      dropdown.innerHTML = scopeNote + suggestionData.map((s, i) => `
        <div class="suggestion-item${i === highlightIdx ? ' highlighted' : ''}" 
             onmousedown="selectSuggestion(${i})">
          <span class="suggestion-icon">${s.emoji}</span>
          <div class="suggestion-text">
            <div class="suggestion-main">${s.name}</div>
            <div class="suggestion-sub">${s.sub}</div>
          </div>
        </div>
      `).join('');
    }

    function handleSearchKey(e) {
      const dropdown = document.getElementById('suggestions-dropdown');
      if (!dropdown.classList.contains('open')) return;

      if (e.key === 'ArrowDown') {
        e.preventDefault();
        highlightIdx = Math.min(highlightIdx + 1, suggestionData.length - 1);
        renderSuggestions();
        // Scroll highlighted item into view
        const items = dropdown.querySelectorAll('.suggestion-item');
        if (items[highlightIdx]) items[highlightIdx].scrollIntoView({ block: 'nearest' });
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        highlightIdx = Math.max(highlightIdx - 1, 0);
        renderSuggestions();
        const items = dropdown.querySelectorAll('.suggestion-item');
        if (items[highlightIdx]) items[highlightIdx].scrollIntoView({ block: 'nearest' });
      } else if (e.key === 'Enter') {
        e.preventDefault();
        const idx = highlightIdx >= 0 ? highlightIdx : 0;
        if (suggestionData[idx]) selectSuggestion(idx);
      } else if (e.key === 'Escape') {
        closeSuggestions();
      }
    }

    function selectSuggestion(idx) {
      const s = suggestionData[idx];
      if (!s) return;

      // Fill input & close dropdown
      document.getElementById('search-input').value = s.name;
      document.getElementById('search-clear').classList.add('visible');
      closeSuggestions();

      // Move map to selected location
      userLatLng = [s.lat, s.lon];
      map.setView(userLatLng, 14, { animate: true, duration: 1 });

      // Update location bar
      document.getElementById('loc-dot').style.background = 'var(--accent)';
      document.getElementById('loc-text').textContent = s.name + (s.sub ? ', ' + s.sub.split(',')[0] : '');

      // Update user marker
      if (userMarker) map.removeLayer(userMarker);
      userMarker = L.marker(userLatLng, { icon: userIcon }).addTo(map);

      // Fetch nearby places for the new location
      document.querySelector('.results-title').textContent = 'Near ' + s.name;
      clearRoute();
      fetchNearbyPlaces(activeType);
    }

    function clearSearch() {
      document.getElementById('search-input').value = '';
      document.getElementById('search-clear').classList.remove('visible');
      closeSuggestions();
    }

    function closeSuggestions() {
      const d = document.getElementById('suggestions-dropdown');
      d.classList.remove('open');
      d.innerHTML = '';
      highlightIdx = -1;
      suggestionData = [];
    }

    // Close dropdown when clicking outside
    document.addEventListener('click', e => {
      if (!document.getElementById('search-box').contains(e.target)) {
        closeSuggestions();
      }
    });

    function locationEmoji(type, cls) {
      if (cls === 'boundary' || cls === 'place') {
        if (type === 'city' || type === 'town') return '🏙️';
        if (type === 'village' || type === 'hamlet') return '🏡';
        if (type === 'suburb' || type === 'neighbourhood') return '🏘️';
        if (type === 'country') return '🌏';
        if (type === 'state' || type === 'county') return '📍';
        return '📍';
      }
      if (cls === 'amenity') {
        if (type.includes('restaurant') || type.includes('cafe')) return '🍽️';
        if (type.includes('hospital')) return '🏥';
        if (type.includes('school') || type.includes('university')) return '🏫';
        if (type.includes('mall') || type.includes('shop')) return '🛍️';
        return '🏢';
      }
      if (cls === 'highway') return '🛣️';
      if (cls === 'railway') return '🚉';
      if (cls === 'tourism') return '📸';
      if (cls === 'natural') return '🌿';
      if (cls === 'waterway') return '🌊';
      return '📍';
    }

    // ─── UI Helpers ───────────────────────────────────────
    function showListLoading() {
      document.getElementById('results-list').innerHTML = `<div class="empty-state"><div style="width:28px;height:28px;border:2px solid #2a2a2a;border-top-color:#e8a317;border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto 12px"></div><p>Finding places…</p></div>`;
      document.getElementById('results-count').textContent = '…';
    }

    // ─── Init ─────────────────────────────────────────────
    getUserLocation();
  </script>
</body>
